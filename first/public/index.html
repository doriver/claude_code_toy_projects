<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2P Chat - 로그인</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <h1>P2P Chat</h1>
    <div class="tabs">
      <button class="tab-btn active" data-tab="login">로그인</button>
      <button class="tab-btn" data-tab="register">회원가입</button>
    </div>

    <div id="login" class="tab-panel active">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="login-username" placeholder="아이디 입력" autocomplete="username">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="login-password" placeholder="비밀번호 입력" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="btn-login">로그인</button>
      <p class="error-msg" id="login-error"></p>
    </div>

    <div id="register" class="tab-panel">
      <div class="form-group">
        <label>아이디 (2자 이상)</label>
        <input type="text" id="reg-username" placeholder="아이디 입력" autocomplete="username">
      </div>
      <div class="form-group">
        <label>비밀번호 (4자 이상)</label>
        <input type="password" id="reg-password" placeholder="비밀번호 입력" autocomplete="new-password">
      </div>
      <button class="btn-primary" id="btn-register">회원가입</button>
      <p class="error-msg" id="register-error"></p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
